name: 金油银哨兵

on:
  schedule:
    - cron: '5 7 * * 1-5'   # 周一至周五 UTC 07:05 = 北京 15:05 亚盘收盘（避开整点高峰）
    - cron: '5 22 * * *'     # 每天 UTC 22:05 = 北京 06:05 美盘收盘（避开整点高峰）
  workflow_dispatch:          # 支持手动触发

jobs:
  daily-report:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PUSH_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 执行金油银哨兵
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          DATA_ENCRYPT_KEY: ${{ secrets.DATA_ENCRYPT_KEY }}
        run: python gold_oil_ratio_daily.py

      - name: 提交加密数据到仓库
        run: |
          if [ -f "gold_oil_data.enc" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add gold_oil_data.enc
            git diff --cached --quiet || git commit -m "📊 数据更新 $(date -u +%Y-%m-%d)"
            git push
          fi
